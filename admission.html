<!DOCTYPE html>
<html>
<head>
<title>Admission - PJSA</title>

<style>
body{
    font-family:Arial;
    background:#f4f4f4;
    margin:0;
}

header{
    background:#143d8f;
    color:white;
    text-align:center;
    padding:15px;
    font-size:25px;
}

form{
    background:white;
    width:90%;
    max-width:400px;
    margin:40px auto;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input,textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#143d8f;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
}
</style>
</head>

<body>

<header>Admission Form</header>

<form>

<input type="text" placeholder="Enter Name">

<input type="number" placeholder="Enter Age">

<input type="text" placeholder="Sport Name">

<textarea placeholder="Address"></textarea>

<button>Submit</button>

</form>

</body>
</html>
